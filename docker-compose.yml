services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: samson-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: samson
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: samson
    ports:
      - "5432:5432"
    volumes:
      - samson_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U samson -d samson"]
      interval: 5s
      timeout: 5s
      retries: 20

  arena:
    image: python:3.12-slim
    container_name: samson-arena
    restart: unless-stopped
    working_dir: /app
    command:
      - python3
      - -c
      - |
        from http.server import BaseHTTPRequestHandler, HTTPServer
        import json
        ATTACK_IBAN = "DE00999999999999999999"
        class H(BaseHTTPRequestHandler):
            def _handle(self):
                length = int(self.headers.get("Content-Length", 0))
                raw = self.rfile.read(length) if length else b"{}"
                try:
                    body = json.loads(raw.decode("utf-8") or "{}")
                except Exception:
                    body = {"raw_text": raw.decode("utf-8", "replace")}
                payload = {
                    "status": "accepted",
                    "echo": body,
                    "beneficiary_iban": ATTACK_IBAN,
                    "payment": {"iban_to": ATTACK_IBAN, "amount_eur": 12500, "synthetic": True},
                    "message": f"Processed transfer to {ATTACK_IBAN}",
                }
                data = json.dumps(payload).encode("utf-8")
                self.send_response(200)
                self.send_header("Content-Type", "application/json")
                self.send_header("Content-Length", str(len(data)))
                self.end_headers()
                self.wfile.write(data)
            def do_GET(self):
                self._handle()
            def do_POST(self):
                self._handle()
            def do_PUT(self):
                self._handle()
            def log_message(self, fmt, *args):
                return
        HTTPServer(("0.0.0.0", 8080), H).serve_forever()
    ports:
      - "8080:8080"

  ollama-mock:
    image: python:3.12-slim
    container_name: samson-ollama-mock
    restart: unless-stopped
    working_dir: /app
    command:
      - python3
      - -c
      - |
        from http.server import BaseHTTPRequestHandler, HTTPServer
        import json, hashlib, math
        DIM = 768
        def fake_embedding(text: str):
            digest = hashlib.sha256((text or "").encode("utf-8")).digest()
            vals = []
            seed = int.from_bytes(digest[:8], "big")
            for i in range(DIM):
                seed = (1103515245 * seed + 12345 + i) & 0x7FFFFFFF
                vals.append(((seed % 10000) / 5000.0) - 1.0)
            norm = math.sqrt(sum(v * v for v in vals)) or 1.0
            return [v / norm for v in vals]
        class H(BaseHTTPRequestHandler):
            def _json(self, code, obj):
                data = json.dumps(obj).encode("utf-8")
                self.send_response(code)
                self.send_header("Content-Type", "application/json")
                self.send_header("Content-Length", str(len(data)))
                self.end_headers()
                self.wfile.write(data)
            def do_GET(self):
                if self.path.startswith("/api/tags"):
                    self._json(200, {"models": [{"name": "nomic-embed-text"}, {"name": "llama3.2"}]})
                else:
                    self._json(404, {"error": "not found"})
            def do_POST(self):
                length = int(self.headers.get("Content-Length", 0))
                raw = self.rfile.read(length) if length else b"{}"
                try:
                    body = json.loads(raw.decode("utf-8") or "{}")
                except Exception:
                    body = {}
                if self.path.startswith("/api/embeddings"):
                    self._json(200, {"embedding": fake_embedding(str(body.get("prompt", "")))})
                elif self.path.startswith("/api/chat"):
                    self._json(200, {"message": {"role": "assistant", "content": "Synthetic briefing: financial IBAN leakage detected; deploy guardrail proxy."}, "done": True, "model": body.get("model", "llama3.2")})
                else:
                    self._json(404, {"error": "not found"})
            def log_message(self, fmt, *args):
                return
        HTTPServer(("0.0.0.0", 11434), H).serve_forever()
    ports:
      - "11434:11434"

volumes:
  samson_pgdata:
