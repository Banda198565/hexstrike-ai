name: Field Recon Cron

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  field-recon-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: |
          python3 -m pip install -q httpx fastmcp eth-account 2>/dev/null || true

      - name: Parallel fast pipeline
        env:
          MEV_SANDBOX_ONLY: "1"
          HOT_WATCH_ONCE: "1"
          HOT_WATCH_DELTA: "1"
          FIELD_RECON_INCREMENTAL: "1"
          FIELD_RECON_PARALLEL: "4"
          SANDBOX_MODE: "1"
          PENTEST_FAST: "1"
          DRY_RUN: "true"
        run: |
          chmod +x scripts/run-hexstrike-fast.sh scripts/pentest/*.sh
          bash scripts/run-hexstrike-fast.sh --quiet || true
        continue-on-error: true

      - name: Attack map auto-diff
        run: python3 scripts/docs/attack_map_diff.py
        continue-on-error: true

      - name: Upload recon artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: field-recon-${{ github.run_id }}
          path: |
            artifacts/sandbox/field-recon-bundle.json
            artifacts/sandbox/hot-wallet-watch.json
            artifacts/sandbox/signing-bot-hunt.json
            artifacts/sandbox/geth-rpc-enum.json
            artifacts/sandbox/jenkins-rpc-enum.json
            artifacts/sandbox/attack-map-diff.json
            artifacts/sandbox/operator-rescue-puissant.json
